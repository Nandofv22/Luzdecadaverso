name: Post reel diario (12h BRT)

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Render reel
        working-directory: scripts
        run: python render_reel.py

      - name: Commit video renderizado
        run: |
          git config user.name "luzdecadaverso-bot"
          git config user.email "actions@users.noreply.github.com"
          git add output/
          git commit -m "chore: render reel $(date -u +%F)" || echo "nothing to commit"
          git push

      - name: Publish to Instagram
        working-directory: scripts
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python publish_reel.py
